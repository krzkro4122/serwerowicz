{% extends "layout.html" %}

{% block title %}
    User Login
{% endblock title %}

{% block content %}
    <section>
        <h1>User Login</h1>
        <form
            action={% url 'users:login' %}
            method="post"
            class="form-with-validation"
        >
            {% csrf_token %}
            {{ form }}
            {% if request.GET.next %}
                <input type="hidden" name="next" value="{{ request.GET.next}}" />
            {% endif %}
            <button class='form-submit'>Login</button>
        </form>
    </section>
{% endblock content %}
