{% extends "layout.html" %}

{% block title %}
    {{ product.title }}
{% endblock title %}

{% block content %}
    <section>
        <img
            class="banner"
            src="{{ product.banner.url }}"
            alt="{{ product.title }}"
        >
        <h1>{{ product.title }}</h1>
        <p>{{ product.date }} by {{ product.author }}</p>
        <p>{{ product.body }}</p>
    </section>
{% endblock content %}
