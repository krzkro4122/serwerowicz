{% extends "layout.html" %}

{% block title %}
    Produkty
{% endblock title %}

{% block content %}
    <section>
        <h1>Lista produktów</h1>

        {% for product in products %}
            <article>
                <h2>
                    <a href="{% url 'products:page' slug=product.slug %}">
                        {{ product.title }}
                    </a>
                </h2>
                <p>{{ product.date }}</p>
                <p>{{ product.body }}</p>
            </article>
        {% endfor %}

    </section>
{% endblock content %}
