# App Runner Configuration
# Note: This file is for reference. For container-based deployments,
# App Runner is configured through the AWS Console or CLI.
# This file would be used for source-based deployments (GitHub/CodeCommit).

version: 1.0
runtime: docker
build:
  commands:
    build:
      - echo "Building Docker image..."
      - docker build -t serwerowicz:latest .
run:
  runtime-version: latest
  command: exec gunicorn --bind 0.0.0.0:${PORT:-8000} --workers 2 --threads 4 --timeout 120 serwerowicz.wsgi:application
  network:
    port: 8000
    env: PORT
  env:
    - name: DJANGO_SETTINGS_MODULE
      value: serwerowicz.settings
    - name: PORT
      value: "8000"
