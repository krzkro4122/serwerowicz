<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            Serwerowicz
        {% endblock %}
    </title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <script defer src="{% static 'js/main.js' %}"></script>
</head>
<body>
    <nav>
        <a href="/">
            <span role='img' aria-label='Home' title="Home">
                🏠
            </span>
        </a> |
        <a href="/about">
            <span role='img' aria-label='About' title="About">
                🧑‍💻
            </span>
        </a> |
        <a href="{% url 'products:list' %}">
            <span role='img' aria-label='Products' title="Products">
                🍞
            </span>
        </a> |
        {% if user.is_authenticated %}
            <a href="{% url 'products:new' %}">
                <span role='img' aria-label='New product' title="New product">
                    🆕
                </span>
            </a> |
            <form class="logout" action="{% url 'users:logout' %}" method="post">
                {% csrf_token %}
                <button class="logout-button" aria-label='User Logout' title='User Logout'>👋</button>
            </form>
        {% else %}
            <a href="{% url 'users:register' %}">
                <span role='img' aria-label='User registration' title="User registration">
                    👥
                </span>
            </a> |
            <a href="{% url 'users:login' %}">
                <span role='img' aria-label='User login' title="User login">
                    🪵
                </span>
            </a>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
